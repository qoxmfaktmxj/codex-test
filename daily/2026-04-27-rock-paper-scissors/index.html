<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>가위바위보</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="game" aria-labelledby="title">
      <h1 id="title">가위바위보</h1>
      <p class="score" data-score>플레이어 0 - 컴퓨터 0</p>
      <p class="status" data-status aria-live="polite">수를 고르세요</p>
      <div class="choices" data-choices aria-label="선택지"></div>
      <button class="reset" type="button" data-reset>다시 시작</button>
    </main>
    <script src="./game-logic.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
