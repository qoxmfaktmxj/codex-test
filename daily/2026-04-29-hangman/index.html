<!doctype html>
<html lang="ko">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>행맨</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="game" aria-labelledby="title">

    <script src="./game-logic.js"></script>
